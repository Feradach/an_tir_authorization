{% extends "authorizations/inner_layout.html" %}
{% load static %}

{% block title %}
    Login
{% endblock %}

{% block body %}

    <h2>Login</h2>
<div class="col-md-4">
    <form action="{% url 'login' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input autofocus class="form-control" name="username" placeholder="Username">
        </div>
        <div class="form-group">
            <div class="password-toggle-wrap">
                <input class="form-control" type="password" id="login_password" name="password" placeholder="Password">
                <button type="button" class="password-toggle" aria-label="Show password" data-target="login_password" title="Show password">
                    <i class="bi bi-eye-slash" aria-hidden="true"></i>
                </button>
            </div>
        </div>
        <input class="btn btn-primary" type="submit" value="Login">
        <a href="{% url 'register' %}" class="btn btn-success ms-2">Create an Account</a>
    </form>
</div>
    <br><br>
<div class="col-md-4">
    <p>Forgot password or username?</p>
    <p><a href="{% url 'recover_account' %}" class="btn btn-warning">Recover Account</a></p>
</div>
{% endblock %}

{% block script %}
    <script>
        document.querySelectorAll('.password-toggle').forEach((button) => {
            button.addEventListener('click', () => {
                const input = document.getElementById(button.dataset.target);
                const showing = input.type === 'text';
                input.type = showing ? 'password' : 'text';
                button.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
                button.setAttribute('title', showing ? 'Show password' : 'Hide password');
                const icon = button.querySelector('i');
                if (icon) {
                    icon.className = showing ? 'bi bi-eye-slash' : 'bi bi-eye';
                }
            });
        });
    </script>
{% endblock %}
